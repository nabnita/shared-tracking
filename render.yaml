services:
  - type: web
    name: expense-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: expense-db
          property: connectionString
      - key: ASYNC_DATABASE_URL
        fromDatabase:
          name: expense-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "https://expense-frontend.onrender.com"
      - key: ENVIRONMENT
        value: "production"

  - type: web
    name: expense-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://expense-backend.onrender.com/api/v1"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: expense-db
    plan: free
    databaseName: expense_db
    user: expense_user
